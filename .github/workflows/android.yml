name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.4 

    - name: Build APK
      run: |
        # Find the directory containing settings.gradle
        ANDROID_DIR=$(find . -name "settings.gradle" -exec dirname {} \;)
        echo "Found Android project in: $ANDROID_DIR"
        
        # FIX: Create the missing gradle.properties file with AndroidX enabled
        echo "android.useAndroidX=true" > "$ANDROID_DIR/gradle.properties"
        echo "android.enableJetifier=true" >> "$ANDROID_DIR/gradle.properties"
        
        cd "$ANDROID_DIR"
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gps-provider-apk
        path: "**/app-debug.apk"
