name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.4 

    - name: Build APK
      run: |
        # 1. Find the Android directory
        ANDROID_DIR=$(find . -name "settings.gradle" -exec dirname {} \;)
        RES_DIR="$ANDROID_DIR/app/src/main/res"
        mkdir -p "$RES_DIR/values"
        mkdir -p "$RES_DIR/mipmap-anydpi-v26"
        
        # 2. Inject missing configurations
        echo "android.useAndroidX=true" > "$ANDROID_DIR/gradle.properties"
        echo "android.enableJetifier=true" >> "$ANDROID_DIR/gradle.properties"
        
        # 3. Create missing strings.xml
        echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">GpsProvider</string></resources>' > "$RES_DIR/values/strings.xml"
        
        # 4. Create missing themes.xml
        echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.GpsProvider" parent="Theme.MaterialComponents.DayNight.NoActionBar" /></resources>' > "$RES_DIR/values/themes.xml"
        
        # 5. Create a dummy icon (XML drawable) so it doesn't fail on missing images
        echo '<?xml version="1.0" encoding="utf-8"?><vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#1A1A1A" android:pathData="M0,0h108v108h-108z"/></vector>' > "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
        cp "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml" "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"

        cd "$ANDROID_DIR"
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gps-provider-apk
        path: "**/app-debug.apk"
