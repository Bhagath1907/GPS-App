name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3 # This installs the build tool for us

    - name: Build APK
      run: |
        # This part automatically finds your android folder and builds the app
        ANDROID_DIR=$(find . -name "settings.gradle" -exec dirname {} \;)
        echo "Found Android project in: $ANDROID_DIR"
        cd "$ANDROID_DIR"
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gps-provider-apk
        path: "**/app-debug.apk" # This finds the finished file wherever it is
